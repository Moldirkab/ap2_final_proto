syntax = "proto3";

package booking;

option go_package = "github.com/YOUR_USERNAME/car-rental-generated/bookingpb;bookingpb";

service BookingService {
  rpc CreateBooking(CreateBookingRequest) returns (BookingResponse);
  rpc CancelBooking(CancelBookingRequest) returns (BookingResponse);
  rpc CompleteBooking(CompleteBookingRequest) returns (BookingResponse);
  rpc GetBooking(GetBookingRequest) returns (BookingResponse);
  rpc ListUserBookings(ListUserBookingsRequest) returns (ListBookingsResponse);
}

message CreateBookingRequest {
  string token = 1;
  string car_id = 2;
  string start_date = 3;
  string end_date = 4;
}

message CancelBookingRequest {
  string booking_id = 1;
}

message CompleteBookingRequest {
  string booking_id = 1;
}

message GetBookingRequest {
  string booking_id = 1;
}

message ListUserBookingsRequest {
  string token = 1;
}

message BookingResponse {
  string id = 1;
  string user_id = 2;
  string car_id = 3;
  string start_date = 4;
  string end_date = 5;
  double total_price = 6;
  string status = 7;
  string created_at = 8;
}

message ListBookingsResponse {
  repeated BookingResponse bookings = 1;
}